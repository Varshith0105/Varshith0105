<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="'Segoe UI', Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1e"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2ec5ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ec5ff"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="8" fill="url(#bg)"/>

  <!-- title -->
  <text x="40" y="42" font-size="15" fill="#2ec5ff" font-weight="700" letter-spacing="1.5">CONTRIBUTION ACTIVITY</text>
  <text x="40" y="62" font-size="11" fill="#7a8bb0">click to view live graph on GitHub</text>

  <!-- gridlines -->
  <g stroke="#1e2a4a" stroke-width="1">
    <line x1="60" y1="110" x2="1160" y2="110"/>
    <line x1="60" y1="160" x2="1160" y2="160"/>
    <line x1="60" y1="210" x2="1160" y2="210"/>
    <line x1="60" y1="260" x2="1160" y2="260"/>
  </g>

  <!-- area under curve -->
  <path d="M60,255 L110,245 L160,235 L210,220 L260,200 L310,215 L360,205 L410,185 L460,175 L510,190 L560,155 L610,145 L660,130 L710,150 L760,120 L810,110 L860,140 L910,105 L960,120 L1010,95 L1060,115 L1110,88 L1160,100 L1160,260 L60,260 Z" fill="url(#area)"/>

  <!-- stroke line -->
  <path d="M60,255 L110,245 L160,235 L210,220 L260,200 L310,215 L360,205 L410,185 L460,175 L510,190 L560,155 L610,145 L660,130 L710,150 L760,120 L810,110 L860,140 L910,105 L960,120 L1010,95 L1060,115 L1110,88 L1160,100" fill="none" stroke="url(#stroke)" stroke-width="2.5"/>

  <!-- data point dots -->
  <g fill="#c084fc">
    <circle cx="260" cy="200" r="3"/>
    <circle cx="510" cy="190" r="3"/>
    <circle cx="760" cy="120" r="3"/>
    <circle cx="1010" cy="95" r="3"/>
    <circle cx="1160" cy="100" r="4" fill="#2ec5ff"/>
  </g>

  <!-- month labels -->
  <g fill="#7a8bb0" font-size="10" text-anchor="middle">
    <text x="110" y="285">Aug</text>
    <text x="260" y="285">Sep</text>
    <text x="410" y="285">Oct</text>
    <text x="560" y="285">Nov</text>
    <text x="710" y="285">Dec</text>
    <text x="860" y="285">Jan</text>
    <text x="1010" y="285">Feb</text>
    <text x="1160" y="285">Now</text>
  </g>
</svg>
