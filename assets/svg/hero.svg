<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" role="img" aria-label="Varshith Julakanti — AI/ML Engineer, Generative AI Enthusiast, Full Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="50%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d0620"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ec5ff"/>
      <stop offset="55%" stop-color="#7aa2ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ec5ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#2ec5ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#0a0f1e" stop-opacity="0"/>
      <stop offset="85%" stop-color="#2ec5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.95"/>
    </radialGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2ec5ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2ec5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2740" stroke-width="0.5" opacity="0.35"/>
    </pattern>
    <clipPath id="avatarClip">
      <circle cx="960" cy="220" r="150"/>
    </clipPath>
    <!-- typing clips -->
    <clipPath id="typeGreet">
      <rect x="60" y="90" width="0" height="50">
        <animate attributeName="width" from="0" to="130" dur="0.6s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="typeName">
      <rect x="60" y="150" width="0" height="80">
        <animate attributeName="width" from="0" to="720" dur="2.4s" begin="0.8s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="typeRoles">
      <rect x="60" y="230" width="0" height="30">
        <animate attributeName="width" from="0" to="640" dur="1.8s" begin="3.4s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="typeBio1">
      <rect x="60" y="276" width="0" height="26">
        <animate attributeName="width" from="0" to="620" dur="1.4s" begin="5.4s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="typeBio2">
      <rect x="60" y="296" width="0" height="26">
        <animate attributeName="width" from="0" to="620" dur="1.4s" begin="6.9s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="typeBio3">
      <rect x="60" y="316" width="0" height="26">
        <animate attributeName="width" from="0" to="560" dur="1.2s" begin="8.4s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="440" fill="url(#bg)"/>
  <rect width="1200" height="440" fill="url(#grid)"/>

  <!-- drifting glow blobs -->
  <circle cx="200" cy="100" r="260" fill="url(#blob1)">
    <animate attributeName="cx" values="200;280;200" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;180;100" dur="16s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="360" r="260" fill="url(#blob2)">
    <animate attributeName="cx" values="1050;950;1050" dur="18s" repeatCount="indefinite"/>
  </circle>

  <!-- horizontal scan line -->
  <rect x="0" width="1200" height="80" fill="url(#scan)" opacity="0.5">
    <animate attributeName="y" values="-80;440" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- circuit lines (left) -->
  <g stroke="#2ec5ff" stroke-width="0.8" opacity="0.35" fill="none">
    <path d="M0,380 L120,380 L140,400 L260,400"/>
    <path d="M0,420 L200,420 L220,400"/>
    <path d="M300,438 L300,410 L340,410"/>
    <circle cx="140" cy="400" r="3" fill="#2ec5ff"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="400" r="3" fill="#c084fc"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="410" r="3" fill="#7aa2ff"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" begin="1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- neural nodes (top-right area) -->
  <g fill="none" stroke="#c084fc" stroke-opacity="0.35">
    <line x1="500" y1="60" x2="600" y2="100"/>
    <line x1="600" y1="100" x2="700" y2="70"/>
    <line x1="600" y1="100" x2="660" y2="160"/>
    <line x1="500" y1="60" x2="440" y2="130"/>
  </g>
  <g>
    <circle cx="500" cy="60" r="4" fill="#2ec5ff"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="100" r="5" fill="#c084fc"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="70" r="3" fill="#7aa2ff"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="660" cy="160" r="3" fill="#2ec5ff"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="440" cy="130" r="3" fill="#c084fc"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- terminal prompt -->
  <g transform="translate(60,44)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#8b5cf6">&gt;</text>
    <text x="18" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#7dd3fc">varshith@github</text>
    <text x="155" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#94a3b8">:~$ whoami</text>
  </g>

  <!-- typed greeting -->
  <g clip-path="url(#typeGreet)">
    <text x="60" y="120" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="26" fill="#cbd5e1">Hi, I'm</text>
  </g>
  <rect x="180" y="98" width="8" height="26" fill="#c084fc" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.6s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" begin="0.7s" repeatCount="indefinite"/>
  </rect>

  <!-- typed name -->
  <g clip-path="url(#typeName)">
    <text x="60" y="200" font-family="Segoe UI, Inter, system-ui, sans-serif" font-weight="800" font-size="72" fill="url(#nameGrad)">Varshith Julakanti</text>
  </g>

  <!-- typed roles -->
  <g clip-path="url(#typeRoles)">
    <text x="60" y="248" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="20" fill="#e2e8f0">
      <tspan fill="#7dd3fc">AI/ML Engineer</tspan>
      <tspan dx="10" fill="#475569">|</tspan>
      <tspan dx="10" fill="#a78bfa">Generative AI Enthusiast</tspan>
      <tspan dx="10" fill="#475569">|</tspan>
      <tspan dx="10" fill="#67e8f9">Full Stack Developer</tspan>
    </text>
  </g>

  <!-- traveling cursor for name (matches typeName animation) -->
  <rect y="150" width="4" height="70" fill="#c084fc">
    <animate attributeName="x" from="60" to="780" dur="2.4s" begin="0.8s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.7s" begin="0.8s" repeatCount="8"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" begin="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- traveling cursor for roles -->
  <rect y="234" width="3" height="22" fill="#7dd3fc">
    <animate attributeName="x" from="60" to="700" dur="1.8s" begin="3.4s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.6s" begin="3.4s" repeatCount="4"/>
  </rect>

  <!-- typed bio (3 lines) -->
  <g clip-path="url(#typeBio1)">
    <text x="60" y="296" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8">Computer Science undergraduate specializing in Artificial Intelligence</text>
  </g>
  <g clip-path="url(#typeBio2)">
    <text x="60" y="316" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8">and Machine Learning. I build intelligent, scalable and impactful</text>
  </g>
  <g clip-path="url(#typeBio3)">
    <text x="60" y="336" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8">AI-powered applications that solve real-world problems.</text>
  </g>

  <!-- persistent bio cursor -->
  <rect y="322" width="3" height="18" fill="#94a3b8">
    <animate attributeName="x" from="60" to="620" dur="1.2s" begin="8.4s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" begin="9.6s" repeatCount="indefinite"/>
  </rect>

  <!-- location -->
  <g transform="translate(60,400)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="9.8s" fill="freeze"/>
    <circle cx="6" cy="-4" r="4" fill="none" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="18" y="0" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Hyderabad, Telangana, India</text>
  </g>

  <!-- avatar: pulsing glow, rotating AI ring -->
  <circle cx="960" cy="220" r="180" fill="url(#ringGlow)">
    <animate attributeName="r" values="170;185;170" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="960" cy="220" r="155" fill="none" stroke="#2ec5ff" stroke-width="2" opacity="0.9"/>
  <circle cx="960" cy="220" r="162" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.6"/>

  <!-- rotating outer ring with dashed segments -->
  <g transform="translate(960,220)">
    <circle r="176" fill="none" stroke="#2ec5ff" stroke-width="1.2" stroke-dasharray="8 6" opacity="0.75">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle r="188" fill="none" stroke="#c084fc" stroke-width="0.8" stroke-dasharray="2 8" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="28s" repeatCount="indefinite"/>
    </circle>
    <!-- orbital node -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
      <circle cx="176" cy="0" r="5" fill="#2ec5ff"/>
      <circle cx="176" cy="0" r="10" fill="#2ec5ff" opacity="0.3"><animate attributeName="r" values="6;14;6" dur="2s" repeatCount="indefinite"/></circle>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="180" to="540" dur="14s" repeatCount="indefinite"/>
      <circle cx="188" cy="0" r="4" fill="#c084fc"/>
    </g>
  </g>

  <image href="https://github.com/Varshith0105.png" x="810" y="70" width="300" height="300" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
</svg>
