<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320" role="img" aria-label="AI-Powered Drug Discovery (DTI)">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#05070d"/><stop offset="1" stop-color="#141033"/></linearGradient>
    <linearGradient id="ac2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2ec5ff"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
    <radialGradient id="atomBlue"><stop offset="0" stop-color="#7dd3fc"/><stop offset="0.6" stop-color="#2ec5ff"/><stop offset="1" stop-color="#1e40af"/></radialGradient>
    <radialGradient id="atomPurple"><stop offset="0" stop-color="#e9d5ff"/><stop offset="0.6" stop-color="#c084fc"/><stop offset="1" stop-color="#6b21a8"/></radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#c084fc" stop-opacity="0.35"/><stop offset="1" stop-color="#c084fc" stop-opacity="0"/></radialGradient>
    <pattern id="grid2" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1a2740" stroke-width="0.4" opacity="0.4"/></pattern>
  </defs>

  <rect width="600" height="320" rx="14" fill="url(#bg2)"/>
  <rect width="600" height="320" rx="14" fill="url(#grid2)"/>
  <circle cx="300" cy="180" r="200" fill="url(#glow2)">
    <animate attributeName="r" values="180;220;180" dur="6s" repeatCount="indefinite"/>
  </circle>
  <rect x="0.5" y="0.5" width="599" height="319" rx="14" fill="none" stroke="url(#ac2)" stroke-opacity="0.4"/>

  <g transform="translate(24,28)">
    <circle r="5" fill="#c084fc"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
    <text x="14" y="4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="url(#ac2)" letter-spacing="1.5">DTI · drug-target interaction</text>
  </g>

  <!-- rotating 3D molecule -->
  <g transform="translate(300,180)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
      <g stroke-width="2" fill="none">
        <!-- perspective hex (elongated Y for isometric feel) -->
        <line x1="-100" y1="0" x2="-50" y2="-45" stroke="#c084fc" stroke-opacity="0.85"/>
        <line x1="-50" y1="-45" x2="50" y2="-45" stroke="#7aa2ff"/>
        <line x1="50" y1="-45" x2="100" y2="0" stroke="#2ec5ff"/>
        <line x1="100" y1="0" x2="50" y2="45" stroke="#c084fc"/>
        <line x1="50" y1="45" x2="-50" y2="45" stroke="#7aa2ff"/>
        <line x1="-50" y1="45" x2="-100" y2="0" stroke="#2ec5ff"/>
        <line x1="-50" y1="-45" x2="-50" y2="45" stroke="#c084fc" stroke-opacity="0.6" stroke-dasharray="3 3"/>
        <line x1="50" y1="-45" x2="50" y2="45" stroke="#7aa2ff" stroke-opacity="0.6" stroke-dasharray="3 3"/>
        <line x1="0" y1="-45" x2="0" y2="45" stroke="#2ec5ff" stroke-opacity="0.4" stroke-dasharray="2 4"/>
      </g>
      <!-- atoms with 3D radial fill -->
      <circle cx="-100" cy="0" r="12" fill="url(#atomBlue)"><animate attributeName="r" values="12;14;12" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="-50" cy="-45" r="12" fill="url(#atomPurple)"><animate attributeName="r" values="12;14;12" dur="3s" begin="0.4s" repeatCount="indefinite"/></circle>
      <circle cx="50" cy="-45" r="12" fill="url(#atomBlue)"><animate attributeName="r" values="12;14;12" dur="3s" begin="0.8s" repeatCount="indefinite"/></circle>
      <circle cx="100" cy="0" r="12" fill="url(#atomPurple)"><animate attributeName="r" values="12;14;12" dur="3s" begin="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="50" cy="45" r="12" fill="url(#atomBlue)"><animate attributeName="r" values="12;14;12" dur="3s" begin="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="-50" cy="45" r="12" fill="url(#atomPurple)"><animate attributeName="r" values="12;14;12" dur="3s" begin="2s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- orbiting electron -->
  <g transform="translate(300,180)">
    <circle r="3" fill="#7dd3fc">
      <animateMotion dur="4s" repeatCount="indefinite" path="M 130 0 A 130 60 0 1 1 -130 0 A 130 60 0 1 1 130 0"/>
    </circle>
    <circle r="3" fill="#c084fc">
      <animateMotion dur="5s" repeatCount="indefinite" path="M -130 0 A 130 60 0 1 1 130 0 A 130 60 0 1 1 -130 0"/>
    </circle>
  </g>

  <text x="24" y="298" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8" letter-spacing="1">CNN · PyTorch · Plotly</text>
</svg>
