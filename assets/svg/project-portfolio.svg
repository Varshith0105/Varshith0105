<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320" role="img" aria-label="Personal Portfolio Website">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#05070d"/><stop offset="1" stop-color="#160a2e"/></linearGradient>
    <linearGradient id="ac4" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2ec5ff"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
    <linearGradient id="loader" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2ec5ff"/><stop offset="0.5" stop-color="#c084fc"/><stop offset="1" stop-color="#2ec5ff"/></linearGradient>
    <radialGradient id="glow4" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#c084fc" stop-opacity="0.45"/><stop offset="1" stop-color="#c084fc" stop-opacity="0"/></radialGradient>
    <pattern id="grid4" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1a2740" stroke-width="0.4" opacity="0.4"/></pattern>
    <filter id="sh4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="320" rx="14" fill="url(#bg4)"/>
  <rect width="600" height="320" rx="14" fill="url(#grid4)"/>
  <circle cx="480" cy="180" r="200" fill="url(#glow4)">
    <animate attributeName="cx" values="480;120;480" dur="16s" repeatCount="indefinite"/>
  </circle>
  <rect x="0.5" y="0.5" width="599" height="319" rx="14" fill="none" stroke="url(#ac4)" stroke-opacity="0.4"/>

  <g transform="translate(24,28)">
    <circle r="5" fill="#c084fc"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <text x="14" y="4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="url(#ac4)" letter-spacing="1.5">PORTFOLIO · varshith-portfolio</text>
  </g>

  <!-- isometric browser window -->
  <g transform="translate(300,180) skewY(-6)" filter="url(#sh4)">
    <g transform="translate(-260,-115)">
      <rect width="520" height="230" rx="12" fill="#0b1220" stroke="#334155"/>
      <!-- title bar -->
      <rect width="520" height="34" rx="12" fill="#111827"/>
      <rect y="24" width="520" height="10" fill="#111827"/>
      <circle cx="20" cy="17" r="5" fill="#ef4444"/>
      <circle cx="38" cy="17" r="5" fill="#f59e0b"/>
      <circle cx="56" cy="17" r="5" fill="#22c55e"/>
      <rect x="180" y="10" width="200" height="14" rx="7" fill="#1e293b"/>
      <text x="280" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#64748b">varshith-portfolio.vercel.app</text>

      <!-- content: animated loader bar -->
      <rect x="30" y="60" width="200" height="16" rx="4" fill="#1e293b"/>
      <rect x="30" y="60" width="200" height="16" rx="4" fill="url(#loader)">
        <animate attributeName="width" values="0;200;0" dur="3s" repeatCount="indefinite"/>
      </rect>

      <!-- text lines -->
      <rect x="30" y="92" width="340" height="8" rx="4" fill="#334155"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></rect>
      <rect x="30" y="108" width="280" height="8" rx="4" fill="#334155"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/></rect>
      <rect x="30" y="124" width="300" height="8" rx="4" fill="#334155"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.6s" repeatCount="indefinite"/></rect>

      <!-- CTA buttons -->
      <rect x="30" y="155" width="90" height="30" rx="8" fill="#0f172a" stroke="#2ec5ff">
        <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <text x="75" y="174" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#7dd3fc">VIEW WORK</text>

      <rect x="130" y="155" width="90" height="30" rx="8" fill="#0f172a" stroke="#c084fc">
        <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
      </rect>
      <text x="175" y="174" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#e9d5ff">CONTACT</text>

      <!-- project card preview -->
      <g transform="translate(390,60)">
        <rect width="110" height="145" rx="8" fill="#0f172a" stroke="#334155"/>
        <rect x="10" y="10" width="90" height="60" rx="4" fill="#1e293b">
          <animate attributeName="fill" values="#1e293b;#2d3d6b;#1e293b" dur="4s" repeatCount="indefinite"/>
        </rect>
        <rect x="10" y="80" width="70" height="8" rx="4" fill="#2ec5ff" opacity="0.7"/>
        <rect x="10" y="94" width="90" height="6" rx="3" fill="#334155"/>
        <rect x="10" y="105" width="80" height="6" rx="3" fill="#334155"/>
        <circle cx="18" cy="127" r="4" fill="#2ec5ff"/>
        <rect x="28" y="123" width="30" height="8" rx="4" fill="#1e293b"/>
        <circle cx="72" cy="127" r="4" fill="#c084fc"/>
        <rect x="82" y="123" width="20" height="8" rx="4" fill="#1e293b"/>
      </g>
    </g>
  </g>

  <!-- floating tech chips -->
  <g font-family="ui-monospace, monospace" font-size="10" fill="#7dd3fc">
    <g transform="translate(40,270)">
      <rect width="60" height="20" rx="10" fill="#0b1220" stroke="#2ec5ff" stroke-opacity="0.5"/>
      <text x="30" y="14" text-anchor="middle">React</text>
      <animateTransform attributeName="transform" type="translate" values="40,270;40,262;40,270" dur="4s" repeatCount="indefinite" additive="replace"/>
    </g>
    <g transform="translate(490,285)">
      <rect width="80" height="20" rx="10" fill="#0b1220" stroke="#c084fc" stroke-opacity="0.5"/>
      <text x="40" y="14" text-anchor="middle" fill="#e9d5ff">TypeScript</text>
      <animateTransform attributeName="transform" type="translate" values="490,285;490,277;490,285" dur="4.5s" repeatCount="indefinite" additive="replace"/>
    </g>
  </g>
</svg>
