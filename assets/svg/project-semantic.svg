<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280" role="img" aria-label="Semantic Search System">
  <defs>
    <linearGradient id="ss_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#111a35"/>
    </linearGradient>
    <radialGradient id="ss_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2ec5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2ec5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="ss_blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="600" height="280" rx="12" fill="url(#ss_bg)" stroke="#2ec5ff" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="598" height="278" rx="12" fill="none" stroke="#c084fc" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Knowledge graph nodes -->
  <g stroke="#2ec5ff" stroke-opacity="0.5" stroke-width="1">
    <line x1="300" y1="140" x2="180" y2="70"><animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/></line>
    <line x1="300" y1="140" x2="420" y2="70"><animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="2.4s" repeatCount="indefinite"/></line>
    <line x1="300" y1="140" x2="150" y2="200"><animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="2.8s" repeatCount="indefinite"/></line>
    <line x1="300" y1="140" x2="450" y2="200"><animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="2.2s" repeatCount="indefinite"/></line>
    <line x1="300" y1="140" x2="300" y2="50"><animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="2.6s" repeatCount="indefinite"/></line>
    <line x1="300" y1="140" x2="300" y2="230"><animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/></line>
    <line x1="180" y1="70" x2="300" y2="50"/>
    <line x1="420" y1="70" x2="300" y2="50"/>
    <line x1="150" y1="200" x2="300" y2="230"/>
    <line x1="450" y1="200" x2="300" y2="230"/>
  </g>
  <!-- Central node -->
  <circle cx="300" cy="140" r="30" fill="url(#ss_glow)"/>
  <circle cx="300" cy="140" r="14" fill="#c084fc" filter="url(#ss_blur)">
    <animate attributeName="r" values="10;16;10" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="300" y="145" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#0a0f1e">RAG</text>
  <!-- Outer nodes -->
  <g fill="#2ec5ff">
    <circle cx="180" cy="70" r="8"><animate attributeName="r" values="6;10;6" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="70" r="8"><animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="200" r="8"><animate attributeName="r" values="6;10;6" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="200" r="8"><animate attributeName="r" values="6;10;6" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="50" r="8"><animate attributeName="r" values="6;10;6" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="230" r="8"><animate attributeName="r" values="6;10;6" dur="2.6s" repeatCount="indefinite"/></circle>
  </g>
  <text x="20" y="30" font-family="monospace" font-size="11" fill="#7dd3fc">> semantic_search.py</text>
  <text x="20" y="265" font-family="monospace" font-size="10" fill="#c084fc" opacity="0.8">[ vector embeddings · similarity · knowledge graph ]</text>
</svg>
