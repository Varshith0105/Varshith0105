<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280" role="img" aria-label="Skin Disease Prediction">
  <defs>
    <linearGradient id="sk_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#1a1230"/>
    </linearGradient>
    <linearGradient id="sk_scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ec5ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2ec5ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2ec5ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="sk_glow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="600" height="280" rx="12" fill="url(#sk_bg)" stroke="#c084fc" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="598" height="278" rx="12" fill="none" stroke="#2ec5ff" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="20" y="30" font-family="monospace" font-size="11" fill="#7dd3fc">> cnn_predict.py --model derm-v2</text>

  <!-- 4 sample skin images (abstract) -->
  <g>
    <rect x="60" y="60" width="100" height="80" rx="6" fill="#3a2418" stroke="#c084fc" stroke-opacity="0.5"/>
    <circle cx="110" cy="100" r="18" fill="#8b4513" opacity="0.7"/>
    <circle cx="115" cy="95" r="6" fill="#5a2a0a"/>

    <rect x="180" y="60" width="100" height="80" rx="6" fill="#4a2a1f" stroke="#c084fc" stroke-opacity="0.5"/>
    <circle cx="230" cy="100" r="20" fill="#a0522d" opacity="0.7"/>
    <circle cx="225" cy="98" r="5" fill="#6b3410"/>

    <rect x="60" y="160" width="100" height="80" rx="6" fill="#3d2016" stroke="#c084fc" stroke-opacity="0.5"/>
    <circle cx="110" cy="200" r="16" fill="#8b3a1a" opacity="0.7"/>

    <rect x="180" y="160" width="100" height="80" rx="6" fill="#4a2a1f" stroke="#c084fc" stroke-opacity="0.5"/>
    <circle cx="230" cy="200" r="22" fill="#a0522d" opacity="0.7"/>
    <circle cx="235" cy="205" r="7" fill="#5a2010"/>
  </g>

  <!-- Scan line over the images -->
  <rect x="55" y="55" width="230" height="6" fill="url(#sk_scan)">
    <animate attributeName="y" values="55;235;55" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- CNN visualization on right -->
  <g stroke="#2ec5ff" stroke-opacity="0.5" fill="#c084fc">
    <line x1="320" y1="150" x2="380" y2="80" stroke-width="0.8"/>
    <line x1="320" y1="150" x2="380" y2="120" stroke-width="0.8"/>
    <line x1="320" y1="150" x2="380" y2="180" stroke-width="0.8"/>
    <line x1="320" y1="150" x2="380" y2="220" stroke-width="0.8"/>
    <line x1="380" y1="80" x2="450" y2="100" stroke-width="0.8"/>
    <line x1="380" y1="120" x2="450" y2="100" stroke-width="0.8"/>
    <line x1="380" y1="180" x2="450" y2="200" stroke-width="0.8"/>
    <line x1="380" y1="220" x2="450" y2="200" stroke-width="0.8"/>
    <line x1="450" y1="100" x2="520" y2="150" stroke-width="0.8"/>
    <line x1="450" y1="200" x2="520" y2="150" stroke-width="0.8"/>

    <circle cx="320" cy="150" r="8" filter="url(#sk_glow)"><animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="80" r="6"/>
    <circle cx="380" cy="120" r="6"/>
    <circle cx="380" cy="180" r="6"/>
    <circle cx="380" cy="220" r="6"/>
    <circle cx="450" cy="100" r="7" fill="#2ec5ff"/>
    <circle cx="450" cy="200" r="7" fill="#2ec5ff"/>
    <circle cx="520" cy="150" r="10" fill="#39d353" filter="url(#sk_glow)"><animate attributeName="r" values="8;12;8" dur="1.6s" repeatCount="indefinite"/></circle>
  </g>

  <text x="500" y="180" text-anchor="middle" font-family="monospace" font-size="9" fill="#39d353">98.4%</text>
  <text x="320" y="265" font-family="monospace" font-size="10" fill="#c084fc" opacity="0.8">[ CNN · 7 classes · dermatology AI ]</text>
</svg>
