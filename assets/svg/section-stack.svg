<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 60" width="900" height="60" role="img" aria-label="TECH STACK">
  <defs>
    <linearGradient id="g_stack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ec5ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <clipPath id="reveal_stack">
      <rect x="60" y="0" width="0" height="60">
        <animate attributeName="width" values="0;186" dur="0.96s" fill="freeze"/>
      </rect>
    </clipPath>
    <radialGradient id="node_stack" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#2ec5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="60" fill="#0a0f1e"/>

  <!-- scan-light sweeping across -->
  <rect x="0" y="0" width="120" height="60" fill="url(#g_stack)" opacity="0.10">
    <animate attributeName="x" values="-120;900" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- rotating glow node on the left -->
  <g transform="translate(30,30)">
    <circle r="14" fill="url(#node_stack)">
      <animate attributeName="r" values="10;16;10" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" fill="#2ec5ff">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="9" fill="none" stroke="#c084fc" stroke-opacity="0.7" stroke-dasharray="4 3">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- typed title -->
  <g clip-path="url(#reveal_stack)">
    <text x="60" y="38" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="700" font-size="22" fill="#e2e8f0" letter-spacing="1.5">> <tspan fill="url(#g_stack)">TECH STACK</tspan></text>
  </g>

  <!-- blinking cursor advances to end-of-text -->
  <rect y="20" width="10" height="22" fill="#c084fc">
    <animate attributeName="x" values="60;250" dur="0.96s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <!-- animated gradient underline -->
  <rect x="0" y="56" width="900" height="2" fill="url(#g_stack)" opacity="0.5"/>
  <rect x="0" y="56" width="0" height="4" fill="url(#g_stack)">
    <animate attributeName="width" values="0;900;0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- floating particles -->
  <g fill="#7dd3fc">
    <circle cx="820" cy="18" r="1.5"><animate attributeName="cy" values="18;42;18" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="40" r="1.5" fill="#c084fc"><animate attributeName="cy" values="40;18;40" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="24" r="1"><animate attributeName="cy" values="24;44;24" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>
