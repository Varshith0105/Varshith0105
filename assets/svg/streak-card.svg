<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 495 195" width="495" height="195" font-family="Segoe UI, Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1e"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="0.6" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7aa2ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="495" height="195" rx="6" fill="url(#bg)"/>

  <!-- three columns -->
  <g text-anchor="middle" fill="#c9d1e6">
    <!-- Total Contributions -->
    <g transform="translate(82,0)">
      <text y="52" font-size="28" font-weight="700" fill="#e5edff">531+</text>
      <text y="78" font-size="14" fill="#2ec5ff" font-weight="600">Total Contributions</text>
      <text y="120" font-size="11" fill="#7a8bb0">Since joining GitHub</text>
    </g>

    <!-- Current Streak (center, larger with ring) -->
    <g transform="translate(247,98)">
      <circle r="58" fill="none" stroke="#2ec5ff" stroke-width="2" opacity="0.9"/>
      <circle r="62" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5" stroke-dasharray="4 6"/>
      <text y="-8" font-size="36" font-weight="800" fill="#e5edff" text-anchor="middle">🔥</text>
      <text y="26" font-size="13" fill="#2ec5ff" font-weight="700" text-anchor="middle">CURRENT STREAK</text>
      <text y="46" font-size="11" fill="#7a8bb0" text-anchor="middle">Keep shipping daily</text>
    </g>

    <!-- Longest Streak -->
    <g transform="translate(413,0)">
      <text y="52" font-size="28" font-weight="700" fill="#e5edff" filter="url(#glow)">
        <tspan fill="url(#flame)">★</tspan>
      </text>
      <text y="78" font-size="14" fill="#a78bfa" font-weight="600">Live Streak Data</text>
      <text y="120" font-size="11" fill="#7a8bb0">Click to view →</text>
    </g>
  </g>

  <!-- subtle bottom accent -->
  <rect x="24" y="178" width="447" height="1" fill="#1e2a4a"/>
</svg>
