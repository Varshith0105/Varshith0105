<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 495 195" width="495" height="195" font-family="'Segoe UI', Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1e"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="495" height="195" rx="6" fill="url(#bg)"/>

  <!-- 3 columns, evenly spaced, no overlap -->
  <g text-anchor="middle">
    <!-- Total Contributions -->
    <g transform="translate(82,0)">
      <text y="72" font-size="34" font-weight="800" fill="#e5edff">531+</text>
      <text y="102" font-size="12" fill="#2ec5ff" font-weight="700" letter-spacing="1">TOTAL CONTRIBS</text>
      <text y="128" font-size="10" fill="#7a8bb0">since joining</text>
    </g>

    <!-- Current Streak (center) -->
    <g transform="translate(247,0)">
      <circle cx="0" cy="88" r="46" fill="none" stroke="#2ec5ff" stroke-width="2" opacity="0.9"/>
      <circle cx="0" cy="88" r="52" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5" stroke-dasharray="3 5"/>
      <text x="0" y="99" font-size="36" text-anchor="middle">🔥</text>
      <text y="158" font-size="12" fill="#a78bfa" font-weight="700" letter-spacing="1">CURRENT STREAK</text>
      <text y="176" font-size="10" fill="#7a8bb0">shipping daily</text>
    </g>

    <!-- View Live -->
    <g transform="translate(413,0)">
      <text y="72" font-size="34" font-weight="800" fill="#c084fc">★</text>
      <text y="102" font-size="12" fill="#c084fc" font-weight="700" letter-spacing="1">LIVE STATS</text>
      <text y="128" font-size="10" fill="#7a8bb0">click to view →</text>
    </g>
  </g>

  <rect x="24" y="184" width="447" height="1" fill="#1e2a4a"/>
</svg>
